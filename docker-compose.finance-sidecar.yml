services:
  openclaw-finance-sidecar:
    container_name: openclaw_finance_sidecar
    build:
      context: ${FINANCE_WORKSPACE_DIR:-/root/.openclaw/workspace/finance_system}
      dockerfile: Dockerfile.tradingagents
    working_dir: /workspace
    env_file:
      - ${FINANCE_SHARED_ENV_FILE:-/root/.openclaw/workspace/finance_system/.env.finance}
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONUTF8: "1"
      TRADINGAGENTS_RESULTS_DIR: /var/lib/openclaw-finance/results
    volumes:
      - ${FINANCE_WORKSPACE_DIR:-/root/.openclaw/workspace/finance_system}:/workspace/finance_system
      - ${OPENCLAW_HOST_HOME:-/root/.openclaw}:/root/.openclaw
      - openclaw_finance_results:/var/lib/openclaw-finance/results
    ports:
      - "127.0.0.1:${FINANCE_DASHBOARD_BIND_PORT:-18791}:18790"
    restart: unless-stopped
    command: >-
      sh -lc "python /workspace/finance_system/dashboard_server.py
      --host 0.0.0.0
      --port 18790
      --secret \"$$FINANCE_DASHBOARD_SECRET\"
      --data-dir /workspace/finance_system/dashboard_data
      --asset-dir /workspace/finance_system/dashboard_assets
      --qq-console-root /root/.openclaw/workspace"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18790/finance', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  openclaw_finance_results:
